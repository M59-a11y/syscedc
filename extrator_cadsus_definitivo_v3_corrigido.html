<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator CADSUS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root {
  --verde: #0d9f6e; --verde-claro: #e6f7f2; --verde-escuro: #076b4a;
  --cinza-bg: #f4f6f8; --cinza-borda: #d1dbe8; --cinza-texto: #5a6a7e;
  --preto: #1a2332; --branco: #ffffff;
  --sombra: 0 2px 16px rgba(0,0,0,0.08); --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cinza-bg); color: var(--preto); min-height: 100vh; padding: 28px 20px 48px; }
body::before { content: ''; display: block; position: fixed; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg,#0d9f6e,#19c98e,#0d9f6e); background-size: 200% 100%; animation: shimmer 2.5s linear infinite; z-index: 100; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.container { max-width: 980px; margin: 0 auto; }
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding: 22px 26px; background: var(--branco); border-radius: var(--radius); box-shadow: var(--sombra); border-left: 4px solid var(--verde); }
.header-icon { width: 48px; height: 48px; background: var(--verde-claro); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-icon svg { width: 26px; height: 26px; stroke: var(--verde-escuro); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.header-title h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; color: var(--preto); }
.header-title p { font-size: 13px; color: var(--cinza-texto); margin-top: 2px; }
.layout { display: grid; grid-template-columns: 1fr 186px; gap: 20px; align-items: start; }
.card { background: var(--branco); border-radius: var(--radius); box-shadow: var(--sombra); overflow: hidden; }
.upload-zone { padding: 26px 26px 0; }
.upload-label { display: block; border: 2px dashed var(--cinza-borda); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: var(--cinza-bg); }
.upload-label:hover, .upload-label.ativo { border-color: var(--verde); background: var(--verde-claro); }
.upload-label input[type=file] { display: none; }
.upload-label svg { width: 36px; height: 36px; stroke: var(--verde); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 10px; }
.upload-label span { display: block; font-size: 14px; font-weight: 600; color: var(--preto); margin-bottom: 4px; }
.upload-label small { font-size: 12px; color: var(--cinza-texto); }
.upload-nome-arquivo { margin-top: 10px; font-size: 12px; font-weight: 600; color: var(--verde-escuro); background: var(--verde-claro); border-radius: 8px; padding: 5px 12px; display: none; }
.status-bar { display: flex; align-items: center; gap: 8px; margin: 14px 26px 0; padding: 9px 14px; border-radius: 10px; background: var(--cinza-bg); font-size: 13px; color: var(--cinza-texto); transition: all 0.2s; }
.status-bar.ok { background: var(--verde-claro); color: var(--verde-escuro); }
.status-bar.lendo { background: #fff8e1; color: #8a6800; }
.status-bar.erro { background: #fde8e8; color: #b91c1c; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cinza-borda); flex-shrink: 0; }
.status-bar.ok .status-dot { background: var(--verde); }
.status-bar.lendo .status-dot { background: #f59e0b; animation: pulsar 1s infinite; }
.status-bar.erro .status-dot { background: #ef4444; }
@keyframes pulsar { 0%,100%{opacity:1} 50%{opacity:0.3} }
.secao-titulo { padding: 18px 26px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--cinza-texto); }
.grid { display: grid; grid-template-columns: 1fr; padding: 0 0 4px; }
.campo { padding: 10px 26px 14px; border-bottom: 1px solid var(--cinza-bg); }
.campo:last-child { border-bottom: none; }
.campo label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--cinza-texto); margin-bottom: 5px; }
.campo label .num { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: var(--verde-claro); color: var(--verde-escuro); border-radius: 50%; font-size: 10px; font-weight: 700; margin-right: 5px; }
.campo input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--cinza-borda); border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--preto); background: var(--cinza-bg); outline: none; transition: border-color 0.18s, background 0.18s; }
.campo input:focus { border-color: var(--verde); background: var(--branco); }
.campo input.preenchido { border-color: var(--verde); background: var(--branco); animation: preencher 0.3s ease; }
@keyframes preencher { 0%{transform:scale(0.98);opacity:0.6} 100%{transform:scale(1);opacity:1} }
.preview-box { margin: 0 26px 26px; padding: 14px; border-radius: 12px; background: #0f1c2e; color: #7dd3b0; max-height: 200px; overflow: auto; font-family: 'DM Mono', monospace; font-size: 11.5px; line-height: 1.6; display: none; }
.preview-box.visivel { display: block; }
.sidebar { position: sticky; top: 20px; display: flex; flex-direction: column; gap: 10px; }
.btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 13px 14px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
.btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.btn-exportar { background: var(--verde); color: #fff; border: 1.5px solid transparent; box-shadow: 0 2px 10px rgba(13,159,110,0.3); }
.btn-exportar:hover:not(:disabled) { background: var(--verde-escuro); box-shadow: 0 4px 14px rgba(13,159,110,0.4); transform: translateY(-1px); }
.btn-exportar:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; transform: none; }
.btn-limpar { background: var(--cinza-bg); color: var(--cinza-texto); border: 1.5px solid var(--cinza-borda); }
.btn-limpar:hover { background: #e8edf3; color: var(--preto); border-color: #b0bec9; }
.sidebar-divider { height: 1px; background: var(--cinza-borda); }
.btn-preview { background: none; color: var(--cinza-texto); border: 1.5px solid var(--cinza-borda); font-family: 'DM Mono', monospace; font-size: 11.5px; font-weight: 400; padding: 9px 10px; }
.btn-preview:hover { background: var(--cinza-bg); color: var(--preto); }
.btn-sistema { background: none; color: #8a9bb0; border: 1.5px solid #c9a96e44; font-size: 12px; font-weight: 500; padding: 9px 10px; }
.btn-sistema:hover { background: #c9a96e11; color: #c9a96e; border-color: #c9a96e99; }
@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; flex-direction: row; flex-wrap: wrap; }
  .sidebar .btn { flex: 1; width: auto; }
  .sidebar-divider { display: none; }
  .upload-zone { padding: 18px 18px 0; }
  .header { padding: 18px; }
  .campo { padding: 10px 18px 14px; }
  .secao-titulo { padding: 18px 18px 8px; }
  .status-bar { margin: 14px 18px 0; }
  .preview-box { margin: 0 18px 18px; }
}
</style>
<link rel="icon" type="image/x-icon" href="cedc.ico">
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </div>
    <div class="header-title">
      <h1>Extrator CADSUS</h1>
      <p>Importa dados do Cadastro Nacional de Usu&#225;rios do SUS automaticamente</p>
    </div>
  </div>
  <div class="layout">
    <div class="card">
      <div class="upload-zone">
        <label class="upload-label" id="uploadLabel">
          <input type="file" id="pdfInput" accept="application/pdf">
          <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          <span id="uploadTexto">Clique ou arraste o PDF do CADSUS aqui</span>
          <small>Formato aceito: PDF &middot; CADSUS WEB / Cadastro Nacional SUS</small>
          <div class="upload-nome-arquivo" id="nomeArquivo"></div>
        </label>
      </div>
      <div class="status-bar" id="statusBar"><div class="status-dot"></div><span id="statusTexto">Aguardando PDF do CADSUS...</span></div>
      <div class="secao-titulo">Dados do paciente</div>
      <div class="grid">
        <div class="campo"><label for="nome"><span class="num">1</span> Nome do Paciente</label><input type="text" id="nome" autocomplete="off" placeholder="&#8212;"></div>
        <div class="campo"><label for="nascimento"><span class="num">2</span> Data de Nascimento</label><input type="text" id="nascimento" autocomplete="off" placeholder="&#8212;"></div>
        <div class="campo"><label for="mae"><span class="num">3</span> Nome da M&#227;e</label><input type="text" id="mae" autocomplete="off" placeholder="&#8212;"></div>
        <div class="campo"><label for="sus"><span class="num">4</span> Cart&#227;o SUS (CNS)</label><input type="text" id="sus" autocomplete="off" placeholder="&#8212;"></div>
        <div class="campo"><label for="cpf"><span class="num">5</span> CPF</label><input type="text" id="cpf" autocomplete="off" placeholder="&#8212;"></div>
        <div class="campo"><label for="telefone"><span class="num">6</span> Telefone</label><input type="text" id="telefone" autocomplete="off" placeholder="&#8212;"></div>
      </div>
      <div class="preview-box" id="previewBox">Texto extra&#237;do do PDF aparecer&#225; aqui.</div>
    </div>
    <div class="sidebar">
      <button class="btn btn-exportar" id="btnExportar" type="button" disabled>
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Abrir no SYSCEDC
      </button>
      <div class="sidebar-divider"></div>
      <button class="btn btn-limpar" id="btnLimpar" type="button">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
        Limpar campos
      </button>
      <div class="sidebar-divider"></div>
      <button class="btn btn-preview" id="btnPreview" type="button">[ texto bruto ]</button>
      <div class="sidebar-divider"></div>
      <button class="btn btn-sistema" onclick="window.location.href='syscedc_laudos_v0_3_9_12_corrigido.html'" type="button">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Ir para o Sistema
      </button>

    </div>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const pdfInput    = document.getElementById("pdfInput");
const statusBar   = document.getElementById("statusBar");
const statusTexto = document.getElementById("statusTexto");
const previewBox  = document.getElementById("previewBox");
const uploadLabel = document.getElementById("uploadLabel");
const nomeArquivo = document.getElementById("nomeArquivo");
const uploadTexto = document.getElementById("uploadTexto");

const campos = {
  nome:       document.getElementById("nome"),
  nascimento: document.getElementById("nascimento"),
  mae:        document.getElementById("mae"),
  sus:        document.getElementById("sus"),
  cpf:        document.getElementById("cpf"),
  telefone:   document.getElementById("telefone")
};

// Botão limpar
document.getElementById("btnLimpar").addEventListener("click", limparCampos);

// Botão exportar SYSCEDC
document.getElementById("btnExportar").addEventListener("click", exportarSYSCEDC);

// Botão preview
document.getElementById("btnPreview").addEventListener("click", function(){
  previewBox.classList.toggle("visivel");
  this.textContent = previewBox.classList.contains("visivel")
    ? "[ ocultar texto bruto ]" : "[ ver texto bruto ]";
});

// Upload
pdfInput.addEventListener("change", carregarPDF);

// Drag & drop visual
uploadLabel.addEventListener("dragover", e => { e.preventDefault(); uploadLabel.classList.add("ativo"); });
uploadLabel.addEventListener("dragleave", () => uploadLabel.classList.remove("ativo"));
uploadLabel.addEventListener("drop", () => uploadLabel.classList.remove("ativo"));

function setStatus(msg, tipo){
  statusTexto.textContent = msg;
  statusBar.className = "status-bar" + (tipo ? " " + tipo : "");
}

function limparCampos(){
  Object.values(campos).forEach(el => { el.value = ""; el.classList.remove("preenchido"); });
  previewBox.textContent = "Texto extraído do PDF aparecerá aqui.";
  previewBox.classList.remove("visivel");
  document.getElementById("btnPreview").textContent = "[ ver texto bruto ]";
  setStatus("Campos limpos. Aguardando novo PDF...", "");
  pdfInput.value = "";
  nomeArquivo.style.display = "none";
  uploadTexto.textContent = "Clique ou arraste o PDF do CADSUS aqui";
  uploadLabel.classList.remove("ativo");
  atualizarBotaoExportar();
}

function preencherCampo(id, valor){
  if(valor){
    campos[id].value = valor;
    campos[id].classList.add("preenchido");
  }
}

function atualizarBotaoExportar(){
  const temDados = Object.values(campos).some(el => el.value.trim() !== "");
  document.getElementById("btnExportar").disabled = !temDados;
}

// Converte DD/MM/AAAA → AAAA-MM-DD (formato exigido pelo input type="date" do SYSCEDC)
function converterDataParaISO(data){
  if(!data) return "";
  var p = data.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!p) return data; // já está em outro formato, deixa como está
  return p[3] + "-" + p[2] + "-" + p[1];
}

function exportarSYSCEDC(){
  const nome = campos.nome.value.trim();

  // Monta objeto exatamente com as chaves que o SYSCEDC espera na função fill()
  const dados = {
    nome:           campos.nome.value.trim(),
    dataNasc:       converterDataParaISO(campos.nascimento.value.trim()),
    nomeMae:        campos.mae.value.trim(),
    cartaoSus:      campos.sus.value.trim(),
    cpf:            campos.cpf.value.trim(),
    tel:            campos.telefone.value.trim(),
    numExame:       "",
    numSerie:       "",
    numAno:         "",
    unidade:        "",
    medicoReq:      "",
    dataSolic:      "",
    dataEntrada:    "",
    dataEmissao:    "",
    macro:          "",
    micro:          "",
    conclusao:      "",
    tipoMatCito:    "",
    metodologia:    "",
    tipoLaudo:      "anatomo",
    materiais:      [],
    patSelecionado: ""
  };

  // Salvar no localStorage para o SYSCEDC ler ao abrir
  try {
    localStorage.setItem("cadsus_pendente", JSON.stringify({
      dados:          dados,
      salvoEm:        new Date().toLocaleString("pt-BR"),
      _origem_cadsus: true
    }));
  } catch(e) {
    setStatus("Erro ao salvar dados: " + e.message, "erro");
    return;
  }

  setStatus("Abrindo SYSCEDC com os dados de " + (nome || "paciente") + "...", "ok");

  // Abrir o SYSCEDC — os dois arquivos devem estar na mesma pasta
  setTimeout(function(){
    window.location.href = "syscedc_laudos_v0_3_9_12_corrigido.html";
  }, 600);
}

async function carregarPDF(e){
  const file = e.target.files[0];
  if(!file) return;

  // UI feedback
  nomeArquivo.textContent = file.name;
  nomeArquivo.style.display = "inline-block";
  uploadTexto.textContent = "PDF carregado — processando...";
  uploadLabel.classList.add("ativo");

  Object.values(campos).forEach(el => { el.value = ""; el.classList.remove("preenchido"); });
  setStatus("Lendo PDF...", "lendo");

  try {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(buffer) }).promise;

    let textoTotal = "";

    for(let p = 1; p <= pdf.numPages; p++){
      setStatus(`Lendo página ${p} de ${pdf.numPages}...`, "lendo");
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();

      // Ordenar itens por posição Y decrescente (topo da página primeiro)
      // Isso garante que Nome: venha antes de Nome Social: no texto final
      const itensSorted = tc.items.slice().sort(function(a,b){
        const ya = a.transform ? a.transform[5] : 0;
        const yb = b.transform ? b.transform[5] : 0;
        return yb - ya;
      });
      let textoPagina = itensSorted.map(function(i){ return i.str||""; }).join(" ");
      textoPagina = normalizarTexto(textoPagina);

      if(textoPagina.replace(/\s/g, "").length < 30){
        setStatus(`Página ${p} sem texto — aplicando OCR...`, "lendo");
        textoPagina = normalizarTexto(await extrairTextoOCR(page));
      }

      textoTotal += " " + textoPagina;
    }

    textoTotal = normalizarTexto(textoTotal);
    previewBox.textContent = textoTotal || "(nenhum texto encontrado)";

    const dados = extrairDados(textoTotal);

    preencherCampo("nome",       dados.nome);
    preencherCampo("nascimento", dados.nascimento);
    preencherCampo("mae",        dados.mae);
    preencherCampo("sus",        dados.sus);
    preencherCampo("cpf",        dados.cpf);
    preencherCampo("telefone",   dados.telefone);

    atualizarBotaoExportar();

    const encontrados = Object.values(dados).filter(Boolean).length;
    setStatus(`Extração concluída — ${encontrados} campo(s) preenchido(s).`, "ok");
    uploadTexto.textContent = "Clique ou arraste para carregar outro PDF";

  } catch(err){
    console.error(err);
    setStatus("Erro ao ler o PDF: " + err.message, "erro");
  }
}

async function extrairTextoOCR(page){
  const viewport = page.getViewport({ scale: 2 });
  const canvas = document.createElement("canvas");
  canvas.width  = Math.ceil(viewport.width);
  canvas.height = Math.ceil(viewport.height);
  await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
  const result = await Tesseract.recognize(canvas, "por");
  return result?.data?.text || "";
}

function normalizarTexto(txt){
  return (txt || "")
    .replace(/\r/g, " ").replace(/\n/g, " ").replace(/\t/g, " ")
    .replace(/[|"""''']/g, " ")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function limparValor(v){
  return (v || "")
    .replace(/\s{2,}/g, " ")
    .replace(/^[\s:;\-–—|]+/, "")
    .replace(/[\s:;\-–—|]+$/, "")
    .trim();
}

function removerLixoFim(v){
  return (v || "")
    .replace(/\b(Idade|Sexo|Feminino|Masculino|Cart[aã]o|CPF|CNS|SUS|Nascimento|Telefone|Fone|Celular|Contato|M[eê]dico|Procedimento|Quantidade|Natureza|Exame|Nome social|Nome do Pai|Pai|Ra[cç]a|Etnia|Nacionalidade|Pa[ií]s)\b.*$/i, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function somenteNome(v){
  v = limparValor(v);
  v = removerLixoFim(v);
  v = v.replace(/[^A-Za-zÀ-ÿ\s]/g, " ").replace(/\s{2,}/g, " ").trim();
  return v;
}

// ─────────────────────────────────────────────
// EXTRAÇÃO ENTRE RÓTULOS
// ─────────────────────────────────────────────
function extrairEntreRotulos(texto, rotulosInicio, rotulosFim){
  for(const ini of rotulosInicio){
    const mIni = new RegExp(ini, "i").exec(texto);
    if(!mIni) continue;
    const restante = texto.slice(mIni.index + mIni[0].length);
    let menorFim = restante.length;
    for(const fim of rotulosFim){
      const mFim = new RegExp(fim, "i").exec(restante);
      if(mFim && mFim.index < menorFim) menorFim = mFim.index;
    }
    const valor = restante.slice(0, menorFim);
    if(valor && valor.trim()) return limparValor(valor);
  }
  return "";
}

// ─────────────────────────────────────────────
// NOME DO PACIENTE
// Suporta: "Nome: FULANO", "Paciente: FULANO", "Usuário: FULANO"
// ─────────────────────────────────────────────
function extrairNomePaciente(texto){
  // 1) Padrão CADSUS: "Nome: DAMIAO BENTO" (vem antes de "Nome Social:")
  let nome = extrairEntreRotulos(
    texto,
    [
      "\\bNome\\s*:(?!\\s*(?:Social|da\\s*M[aã]e|do\\s*Pai|do\\s*Paciente|Logradouro))",
      "Nome\\s+do\\s+Paciente\\s*:?",
      "Paciente\\s*:?",
      "Usu[aá]rio\\s*:?"
    ],
    [
      "Nome\\s+Social\\s*:?",
      "Nome\\s+da\\s+M[aã]e\\s*:?",
      "Nome\\s+do\\s+Pai\\s*:?",
      "(?:Data\\s+de\\s+)?Nascimento\\s*:?",
      "CNS\\s*:?",
      "CPF\\s*:?",
      "Sexo\\s*:?",
      "Idade\\s*:?",
      "M[aã]e\\s*:?",
      "Cart[aã]o\\s+SUS\\s*:?",
      "Telefone\\s*:?",
      "Fone\\s*:?",
      "Celular\\s*:?",
      "Ra[cç]a\\s*:?",
      "Etnia\\s*:?",
      "Naturaliza"
    ]
  );

  nome = somenteNome(nome);
  if(nome && nome.split(" ").filter(Boolean).length >= 2) return nome;

  // 2) Regex direto: "Nome: NOME COMPLETO" antes de linha Nova ou campo
  const m = texto.match(/\bNome\s*:\s*([A-ZÀÁÂÃÄÅÈÉÊËÌÍÎÏÒÓÔÕÖÙÚÛÜÝŸ][A-ZÀ-ÿa-z\s]{3,}?)(?=\s+(?:Nome\s+Social|CNS|CPF|Nascimento|Sexo|Ra[cç]a|Naturaliz|Nome\s+da\s+M[aã]e|Nome\s+do\s+Pai))/i);
  if(m){
    const n = somenteNome(m[1]);
    if(n) return n;
  }

  // Fallback CADSUS WEB: Nome antes de "Nome da Mae" ou "Nome do Pai"
  const mCadsus = texto.match(/\bNome\s*:\s*([A-Z\xC0-\xFF](?:[A-Z\xC0-\xFFa-z]+\s+){1,6}[A-Z\xC0-\xFFa-z]+)\s+(?=Nome\s+(?:da|do|Social)|CNS|CPF|Data\s+de\s+Nasc)/i);
  if(mCadsus){ const n = mCadsus[1].trim(); if(n && n.split(" ").length >= 2) return n; }
  return nome;
}

// ─────────────────────────────────────────────
// NOME DA MÃE
// ─────────────────────────────────────────────
function extrairNomeMae(texto){
  let mae = extrairEntreRotulos(
    texto,
    ["Nome\\s+da\\s+M[aã]e\\s*:?", "M[aã]e\\s*:?"],
    [
      "Nome\\s+do\\s+Pai\\s*:?",
      "Pai\\s*:?",
      "Cart[aã]o\\s+SUS\\s*:?",
      "CNS\\s*:?",
      "CPF\\s*:?",
      "Telefone\\s*:?",
      "Fone\\s*:?",
      "Celular\\s*:?",
      "(?:Data\\s+de\\s+)?Nascimento\\s*:?",
      "Natureza\\s*:?",
      "Diagn[oó]stico\\s*:?",
      "Ra[cç]a\\s*:?",
      "Sexo\\s*:?"
    ]
  );
  return somenteNome(mae);
}

// ─────────────────────────────────────────────
// DATA DE NASCIMENTO
// ─────────────────────────────────────────────
function extrairNascimento(texto){
  // Pegar data diretamente após rótulo Nascimento (evita pegar data do documento)
  const mDir = texto.match(/(?:Data\s+de\s+)?Nascimento\s*:?\s*(\d{2}\/\d{2}\/\d{4})/i);
  if(mDir) return mDir[1];
  const trecho = extrairEntreRotulos(
    texto,
    ["(?:Data\\s+de\\s+)?Nascimento\\s*:?"],
    ["M[aã]e\\s*:?","Nome\\s+da\\s+M[aã]e\\s*:?","Cart[aã]o\\s*:?","CPF\\s*:?","Sexo\\s*:?","Idade\\s*:?","Telefone\\s*:?","[Óo]bito\\s*:?","Tipo\\s+sang"]
  );
  const m1 = trecho.match(/\b\d{2}\/\d{2}\/\d{4}\b/);
  if(m1) return m1[0];
  const m2 = texto.match(/\b\d{2}\/\d{2}\/\d{4}\b/);
  return m2 ? m2[0] : "";
}

// ─────────────────────────────────────────────
// CARTÃO SUS (CNS) — 15 dígitos
// ─────────────────────────────────────────────
function extrairSUS(texto){
  const trecho = extrairEntreRotulos(
    texto,
    ["Cart[aã]o\\s+SUS\\s*:?","\\bCNS\\s*:?","\\bSUS\\s*:?"],
    ["CPF\\s*:?","Telefone\\s*:?","Fone\\s*:?","Celular\\s*:?","Contato\\s*:?","Natureza\\s*:?","M[eê]dico\\s*:?","Procedimento\\s*:?","Diagn[oó]stico\\s*:?","Data\\s*:?"]
  );
  const soDigitosTrecho = trecho.replace(/\D/g, "");
  if(soDigitosTrecho.length >= 15) return soDigitosTrecho.slice(0, 15);

  // Busca no texto todo: "CNS:705002818110055" ou número de 15 dígitos
  const mCNS = texto.match(/CNS\s*:?\s*(\d[\d\s]{13,16}\d)/i);
  if(mCNS){
    const d = mCNS[1].replace(/\D/g,"");
    if(d.length >= 15) return d.slice(0,15);
  }

  const todos = texto.match(/\b\d{15}\b/g);
  return todos ? todos[0] : "";
}

// ─────────────────────────────────────────────
// CPF
// ─────────────────────────────────────────────
function extrairCPF(texto){
  const m = texto.match(/\b\d{3}\.?\d{3}\.?\d{3}-?\d{2}\b/);
  if(m) return m[0];
  const m2 = texto.match(/\b\d{11}\b/);
  return m2 ? m2[0] : "";
}

// ─────────────────────────────────────────────
// TELEFONE
// Suporta DDD separado: "RESIDENCIAL 61 33152425"
//                        "DDD 61 Número 33152425"
// ─────────────────────────────────────────────
function extrairTelefone(texto){

  // 1) Padrão tabela CADSUS: tipo de telefone + DDD + número em sequência
  //    Ex: "RESIDENCIAL 61 33152425"  ou  "DDD 61 Número 33152425"
  const mTabela = texto.match(/(?:RESIDENCIAL|CELULAR|COMERCIAL|M[Óó]VEL)\s+(\d{2})\s+(\d{7,9})/i);
  if(mTabela){
    const ddd    = mTabela[1];
    const numero = mTabela[2];
    const digitos = ddd + numero;
    return formatarTelefone(digitos);
  }

  // 2) DDD + número explicitamente rotulados
  const mDDD = texto.match(/\bDDD\s*:?\s*(\d{2})\s+(?:N[uú]mero\s*:?\s*)?(\d{7,9})/i);
  if(mDDD){
    return formatarTelefone(mDDD[1] + mDDD[2]);
  }

  // 3) Formatos tradicionais: (61) 99999-9999, 61999999999, etc.
  const rotulos = ["Telefone\\s*:?","Fone\\s*:?","Celular\\s*:?","Contato\\s*:?"];
  for(const rotulo of rotulos){
    const trecho = extrairEntreRotulos(
      texto, [rotulo],
      ["Paciente\\s*:?","Nome\\s*:?","Nascimento\\s*:?","M[aã]e\\s*:?","CNS\\s*:?","CPF\\s*:?","Sexo\\s*:?","Natureza\\s*:?"]
    );
    const tel = localizarTelefone(trecho);
    if(tel) return tel;
  }

  return localizarTelefone(texto);
}

function localizarTelefone(txt){
  if(!txt) return "";
  const padroes = [
    /\b(?:\(?\d{2}\)?\s?)?(?:9\d{4}|\d{4})-?\d{4}\b/g,
    /\b\d{2}\s?9\d{4}-?\d{4}\b/g,
    /\b\d{10,11}\b/g
  ];
  for(const re of padroes){
    const enc = txt.match(re);
    if(enc){
      const d = enc[0].replace(/\D/g,"");
      if(d.length === 10 || d.length === 11) return formatarTelefone(d);
    }
  }
  return "";
}

function formatarTelefone(digitos){
  digitos = (digitos || "").replace(/\D/g, "");
  if(digitos.length === 11) return `(${digitos.slice(0,2)}) ${digitos.slice(2,7)}-${digitos.slice(7)}`;
  if(digitos.length === 10) return `(${digitos.slice(0,2)}) ${digitos.slice(2,6)}-${digitos.slice(6)}`;
  return digitos;
}

// ─────────────────────────────────────────────
// EXTRAÇÃO GERAL
// ─────────────────────────────────────────────
function extrairDados(texto){
  // Eliminar "Nome Social" para nao interferir na extracao do nome do paciente
  var partes = texto.split("Nome Social");
  var textoLimpo = partes.length > 1 ? partes[0] + partes.slice(1).join(" ").replace(/^[^N]*/, "") : texto;
  if(!textoLimpo || textoLimpo.trim().length < 30) textoLimpo = texto;
  return {
    nome:       acentuarNome(extrairNomePaciente(textoLimpo)),
    nascimento: extrairNascimento(textoLimpo),
    mae:        acentuarNome(extrairNomeMae(textoLimpo)),
    sus:        extrairSUS(textoLimpo),
    cpf:        extrairCPF(textoLimpo),
    telefone:   extrairTelefone(textoLimpo)
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// ACENTUAÇÃO AUTOMÁTICA DE NOMES BRASILEIROS
// Aplica acentos corretos em nomes grafados sem acentuação (padrão CADSUS/SUS)
// ─────────────────────────────────────────────────────────────────────────────
function acentuarNome(nome){
  if(!nome) return nome;

  // Dicionário de palavras inteiras (case-insensitive, palavra completa)
  // Formato: [ /regex/, "substituição" ]
  var dic = [
    // Preposições e artigos — ficam minúsculas dentro do nome (padrão ABNT/cartório)
    // Mas como o pedido é TUDO MAIÚSCULO, mantemos maiúsculas mesmo
    // (não há preposição em maiúsculo que precise de acento)

    // Terminações -ÃO / -ÃES sem acento → com acento, MAIÚSCULAS
    [/\bCONCEICAO\b/g,    "CONCEIÇÃO"],
    [/\bASSUNCAO\b/g,     "ASSUNÇÃO"],
    [/\bAPARICAO\b/g,     "APARIÇÃO"],

    [/\bCOROACAO\b/g,     "COROAÇÃO"],
    [/\bCORONACAO\b/g,    "CORONAÇÃO"],
    [/\bFUNDACAO\b/g,     "FUNDAÇÃO"],
    [/\bANUNCIACAO\b/g,   "ANUNCIAÇÃO"],
    [/\bREDENCAO\b/g,     "REDENÇÃO"],
    [/\bNATACAO\b/g,      "NATAÇÃO"],
    [/\bCRIACAO\b/g,      "CRIAÇÃO"],
    [/\bRECREACAO\b/g,    "RECREAÇÃO"],
    [/\bRESOLUCAO\b/g,    "RESOLUÇÃO"],
    [/\bEDUCACAO\b/g,     "EDUCAÇÃO"],
    [/\bNATIVIDADE\b/g,   "NATIVIDADE"],
    [/\bSEBASTIAO\b/g,    "SEBASTIÃO"],
    [/\bPAIXAO\b/g,       "PAIXÃO"],
    [/\bBARAO\b/g,        "BARÃO"],
    [/\bSIMOES\b/g,       "SIMÕES"],
    [/\bJOAO\b/g,         "JOÃO"],
    [/\bJOANA\b/g,        "JOANA"],

    // Nomes com acento agudo
    [/\bJOSE\b/g,         "JOSÉ"],
    [/\bCESAR\b/g,        "CÉSAR"],
    [/\bHELIO\b/g,        "HÉLIO"],
    [/\bFABIO\b/g,        "FÁBIO"],
    [/\bFABRICIO\b/g,     "FABRÍCIO"],
    [/\bJULIO\b/g,        "JÚLIO"],
    [/\bMARIO\b/g,        "MÁRIO"],
    [/\bSERGIO\b/g,       "SÉRGIO"],
    [/\bSILVIO\b/g,       "SÍLVIO"],
    [/\bJUNIOR\b/g,       "JÚNIOR"],
    [/\bDAMIAO\b/g,       "DAMIÃO"],
    [/\bRAIMUNDO\b/g,     "RAIMUNDO"],
    [/\bLUIS\b/g,         "LUÍS"],
    [/\bLUIZA\b/g,        "LUÍZA"],
    [/\bLUISA\b/g,        "LUÍSA"],
    [/\bDEBORA\b/g,       "DÉBORA"],
    [/\bFATIMA\b/g,       "FÁTIMA"],
    [/\bFELICIA\b/g,      "FELÍCIA"],
    [/\bJESSICA\b/g,      "JÉSSICA"],
    [/\bJULIA\b/g,        "JÚLIA"],
    [/\bKATIA\b/g,        "KÁTIA"],
    [/\bLETICIA\b/g,      "LETÍCIA"],
    [/\bLIGIA\b/g,        "LÍGIA"],
    [/\bLUCIA\b/g,        "LÚCIA"],
    [/\bNADIA\b/g,        "NÁDIA"],
    [/\bNATALIA\b/g,      "NATÁLIA"],
    [/\bNIVEA\b/g,        "NÍVEA"],
    [/\bOFELIA\b/g,       "OFÉLIA"],
    [/\bOTALIA\b/g,       "OTÁLIA"],
    [/\bPATRICIA\b/g,     "PATRÍCIA"],
    [/\bROSALIA\b/g,      "ROSÁLIA"],
    [/\bSILVIA\b/g,       "SÍLVIA"],
    [/\bVALERIA\b/g,      "VALÉRIA"],
    [/\bZELIA\b/g,        "ZÉLIA"],
    [/\bCECILIA\b/g,      "CECÍLIA"],
    [/\bMARCIA\b/g,       "MÁRCIA"],
    [/\bGLAUCIA\b/g,      "GLÁUCIA"],
    [/\bCLAUDIA\b/g,      "CLÁUDIA"],
    [/\bCLAUDIO\b/g,      "CLÁUDIO"],
    [/\bLEA\b/g,          "LÉA"],
    [/\bINES\b/g,         "INÊS"],
    [/\bAGNES\b/g,        "AGNÊS"],
    [/\bMARINIA\b/g,      "MARÍNIA"],

    // Nomes com til (~)
    [/\bANTONIO\b/g,      "ANTÔNIO"],
    [/\bANGELA\b/g,       "ÂNGELA"],
    [/\bMONICA\b/g,       "MÔNICA"],
    [/\bSONIA\b/g,        "SÔNIA"],
    [/\bVERONICA\b/g,     "VERÔNICA"],
    [/\bROSANGELA\b/g,    "ROSÂNGELA"],
    [/\bSANIA\b/g,        "SÂNIA"],

    // Sobrenomes com acento
    [/\bARAUJO\b/g,       "ARAÚJO"],
    [/\bMAGALHAES\b/g,    "MAGALHÃES"],
    [/\bGONCALVES\b/g,    "GONÇALVES"],
    [/\bNOBREGA\b/g,      "NÓBREGA"],
    [/\bGRACA\b/g,        "GRAÇA"],

    // Cedilha
    [/\bCONCEICAO\b/g,    "CONCEIÇÃO"],  // redundante mas seguro
    [/\bFRANCISCA\b/g,    "FRANCISCA"],  // sem cedilha, ok
    [/\bGONCALVES\b/g,    "GONÇALVES"]   // já acima
  ];

  // 1. Garantir maiúsculas para bater com o dicionário
  var resultado = nome.toUpperCase();

  // 2. Aplicar substituições: sem acento → com acento, tudo MAIÚSCULO
  for(var i = 0; i < dic.length; i++){
    resultado = resultado.replace(dic[i][0], dic[i][1]);
  }

  return resultado;
}
